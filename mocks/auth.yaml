- method: POST
  path: /auth/login
  body:
    username: admin
    password: password123
  response:
    status: 200
    headers:
      Content-Type: application/json
    body: |
      {"token": "{{uuid}}", "expiresIn": 3600}

- method: POST
  path: /auth/login
  response:
    status: 401
    headers:
      Content-Type: application/json
    body: |
      {"error": "Invalid credentials"}
    template: false

- method: POST
  path: /auth/logout
  response:
    status: 204
